  <!-- ============================================================ -->
  <!-- TAKEAWAY BAR                                                  -->
  <!-- ============================================================ -->
  <rect x="0" y="590" width="1200" height="85" fill="#F59E0B" opacity="0.85"/>
  <text x="600" y="640" font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-size="19" font-weight="600" fill="#FFFFFF" text-anchor="middle">More processor workers speed things up, but not past your core count. F# leads; C trails.</text>

  <!-- Attribution -->
  <text x="1168" y="667" font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-size="12" font-weight="400" fill="#94A3B8" text-anchor="end">I. John Alamina - Multi-Processing Series, Episode 1 - Lab 1.1</text>

</svg>