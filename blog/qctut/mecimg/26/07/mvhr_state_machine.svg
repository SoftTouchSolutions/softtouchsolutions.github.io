<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#999"/>
    </marker>
    <marker id="arrow-init" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#388E3C"/>
    </marker>
    <marker id="arrow-reset" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#1565C0"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="820" fill="#FAFAFA"/>
  <rect x="15" y="15" width="1170" height="790" fill="none" stroke="#E0E0E0" stroke-width="1" rx="4"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#333">MVHR Control System — Operating Mode State Machine</text>
  <text x="600" y="54" text-anchor="middle" font-size="10" fill="#666">Priority cascade: FROST_PROTECT > FAULT > BOOST > BYPASS > NORMAL</text>

  <!-- ==================== TRANSITIONS ==================== -->

  <!-- NORMAL → BOOST -->
  <path d="M 440 315 L 270 315" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="355" y="298" text-anchor="middle" font-size="8.5" fill="#555">
    <tspan x="355" dy="0">CO₂>900ppm | VOC>200ppb | RH>75%</tspan>
    <tspan x="355" dy="10">Manual override (switch / MQTT)</tspan>
  </text>

  <!-- BOOST → NORMAL -->
  <path d="M 270 355 L 440 355" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="355" y="368" text-anchor="middle" font-size="8.5" fill="#555">All &lt; hysteresis thresholds and dwell ≥120s</text>

  <!-- NORMAL → BYPASS -->
  <path d="M 680 315 L 820 315" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="750" y="298" text-anchor="middle" font-size="8.5" fill="#555">
    <tspan x="750" dy="0">T_out > T_ext + 2°C</tspan>
    <tspan x="750" dy="10">and Summer / warm season flag</tspan>
  </text>

  <!-- BYPASS → NORMAL -->
  <path d="M 820 355 L 680 355" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="750" y="368" text-anchor="middle" font-size="8.5" fill="#555">T_out &lt; T_ext − 2°C and minimum dwell</text>

  <!-- NORMAL → FROST_PROTECT -->
  <path d="M 480 290 L 480 215 L 270 215 L 270 140" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="205" text-anchor="middle" font-size="8.5" fill="#555">T_out &lt; frost threshold (configurable, default +2°C)</text>

  <!-- FROST_PROTECT → NORMAL -->
  <path d="M 350 140 L 350 215 L 530 215 L 530 290" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="225" text-anchor="middle" font-size="8.5" fill="#555">T_out ≥ frost threshold + hysteresis</text>

  <!-- FROST_PROTECT → DEFROST (entry) -->
  <path d="M 380 85 L 490 85" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="70" text-anchor="middle" font-size="8.5" fill="#555">
    <tspan x="435" dy="0">RPM_s &lt; 450 rpm</tspan>
    <tspan x="435" dy="10">or ΔP rise ≥ 20 Pa / 60s</tspan>
  </text>

  <!-- DEFROST → FROST_PROTECT (exit) -->
  <path d="M 490 120 L 380 120" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="135" text-anchor="middle" font-size="8.5" fill="#555">Defrost timer ≥ 600s expired</text>

  <!-- ==================== FAULT TRANSITIONS (dashed) ==================== -->

  <!-- NORMAL → FAULT -->
  <path d="M 560 370 L 560 560" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>
  <text x="575" y="455" text-anchor="start" font-size="8.5" fill="#666" font-style="italic">Any fault condition</text>

  <!-- BOOST → FAULT -->
  <path d="M 170 370 L 170 475 L 480 475 L 480 560" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>

  <!-- BYPASS → FAULT -->
  <path d="M 920 370 L 920 475 L 640 475 L 640 560" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>

  <!-- FROST_PROTECT → FAULT -->
  <path d="M 270 140 L 270 475 L 450 475 L 450 560" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>

  <!-- DEFROST → FAULT -->
  <path d="M 620 140 L 620 475 L 560 475 L 560 560" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>

  <!-- FAULT → NORMAL (manual reset) -->
  <path d="M 680 600 L 770 600 L 770 336 L 680 336" fill="none" stroke="#1565C0" stroke-width="1.8" stroke-dasharray="8,4" marker-end="url(#arrow-reset)"/>
  <text x="740" y="460" text-anchor="middle" font-size="8.5" fill="#1565C0">
    <tspan x="740" dy="0">Manual reset (HMI / MQTT)</tspan>
    <tspan x="740" dy="10">and fault condition cleared</tspan>
  </text>

  <!-- ==================== INITIAL STATE ==================== -->
  <circle cx="400" cy="330" r="7" fill="#388E3C"/>
  <path d="M 407 330 L 435 330" fill="none" stroke="#388E3C" stroke-width="2" marker-end="url(#arrow-init)"/>

  <!-- ==================== STATE BOXES ==================== -->

  <!-- NORMAL -->
  <rect x="440" y="290" width="240" height="80" rx="10" fill="#43A047" filter="url(#shadow)"/>
  <text x="560" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">NORMAL</text>
  <text x="560" y="350" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Demand-controlled ventilation</text>

  <!-- BOOST -->
  <rect x="70" y="290" width="200" height="80" rx="10" fill="#FB8C00" filter="url(#shadow)"/>
  <text x="170" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">BOOST</text>
  <text x="170" y="350" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Maximum fan speed</text>

  <!-- BYPASS -->
  <rect x="820" y="290" width="200" height="80" rx="10" fill="#1E88E5" filter="url(#shadow)"/>
  <text x="920" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">BYPASS</text>
  <text x="920" y="350" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Summer cooling mode</text>

  <!-- FROST_PROTECT -->
  <rect x="160" y="60" width="220" height="80" rx="10" fill="#00897B" filter="url(#shadow)"/>
  <text x="270" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">FROST_PROTECT</text>
  <text x="270" y="120" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Reduce supply, pre-heat if fitted</text>

  <!-- DEFROST -->
  <rect x="490" y="60" width="220" height="80" rx="10" fill="#7B1FA2" filter="url(#shadow)"/>
  <text x="600" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">DEFROST</text>
  <text x="600" y="120" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Ice removal — supply fan 0%</text>

  <!-- FAULT -->
  <rect x="440" y="560" width="240" height="80" rx="10" fill="#E53935" filter="url(#shadow)"/>
  <text x="560" y="596" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">FAULT</text>
  <text x="560" y="620" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Latching — manual reset only</text>

  <!-- ==================== SENSOR INVENTORY ==================== -->
  <rect x="25" y="655" width="360" height="100" rx="6" fill="#fff" stroke="#CCC" stroke-width="1"/>
  <text x="35" y="670" font-size="10" font-weight="700" fill="#333">Sensor Inventory</text>
  <!-- Column 1 -->
  <text x="35" y="684" font-size="8" fill="#555">T_out: Outdoor temperature (−20…+45°C)</text>
  <text x="35" y="696" font-size="8" fill="#555">T_sup: Supply temperature (0…30°C)</text>
  <text x="35" y="708" font-size="8" fill="#555">T_ext: Extract temperature (15…28°C)</text>
  <text x="35" y="720" font-size="8" fill="#555">RH: Relative humidity (20…100%)</text>
  <text x="35" y="732" font-size="8" fill="#555">CO₂: Carbon dioxide (400…2000 ppm)</text>
  <text x="35" y="744" font-size="8" fill="#555">VOC: Volatile organic comp. (0…1000 ppb)</text>
  <!-- Column 2 -->
  <text x="195" y="684" font-size="8" fill="#555">ΔP_f: Filter diff. pressure (0…300 Pa)</text>
  <text x="195" y="696" font-size="8" fill="#555">RPM_s: Supply fan speed (0…2200 RPM)</text>
  <text x="195" y="708" font-size="8" fill="#555">RPM_e: Extract fan speed (0…2200 RPM)</text>
  <text x="195" y="720" font-size="8" fill="#555">I_s: Supply fan current (0…3 A)</text>
  <text x="195" y="732" font-size="8" fill="#555">I_e: Extract fan current (0…3 A)</text>

  <!-- ==================== ACTUATOR INVENTORY ==================== -->
  <rect x="410" y="655" width="380" height="100" rx="6" fill="#fff" stroke="#CCC" stroke-width="1"/>
  <text x="420" y="670" font-size="10" font-weight="700" fill="#333">Actuator Inventory</text>
  <text x="420" y="686" font-size="8" fill="#555">FAN_S: Supply EC fan — 0–10V / PWM, 0–100% speed</text>
  <text x="420" y="700" font-size="8" fill="#555">FAN_E: Extract EC fan — 0–10V / PWM, 0–100% speed</text>
  <text x="420" y="714" font-size="8" fill="#555">DAMPER: Bypass damper — 24 VAC / 0–10V, OPEN/CLOSED</text>
  <text x="420" y="728" font-size="8" fill="#555">PREHEAT: Pre-heater element — Relay/SSR, ON/OFF (optional)</text>

  <!-- ==================== FAULT TRIGGERS ==================== -->
  <rect x="815" y="655" width="360" height="100" rx="6" fill="#FFF3F3" stroke="#E53935" stroke-width="1" opacity="0.9"/>
  <text x="825" y="670" font-size="10" font-weight="700" fill="#C62828">Fault Triggers</text>
  <text x="825" y="686" font-size="8.5" fill="#555">Fan stall, overcurrent, sensor stuck (implausible reading)</text>
  <text x="825" y="700" font-size="8.5" fill="#555">ΔP_f > 250 Pa (severely blocked / collapsed filter)</text>
  <text x="825" y="714" font-size="8.5" fill="#555">RPM Δ > 20% from setpoint for > 30 s</text>
  <text x="825" y="728" font-size="8.5" fill="#555">Watchdog timeout (MCU reset)</text>
  <text x="825" y="742" font-size="8.5" fill="#888" font-style="italic">FAULT latches until manually cleared via HMI or MQTT</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="25" y="770" width="1150" height="40" rx="6" fill="#fff" stroke="#CCC" stroke-width="1"/>
  <text x="35" y="783" font-size="9" font-weight="700" fill="#555">Legend:</text>
  <line x1="85" y1="780" x2="99" y2="780" stroke="#555" stroke-width="1.5"/>
  <text x="105" y="783" font-size="8" fill="#555">Mode transition</text>
  <line x1="185" y1="780" x2="199" y2="780" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="205" y="783" font-size="8" fill="#555">Fault transition</text>
  <line x1="285" y1="780" x2="299" y2="780" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="305" y="783" font-size="8" fill="#555">Manual reset</text>
  <circle cx="375" cy="780" r="4" fill="#388E3C"/>
  <text x="384" y="783" font-size="8" fill="#555">Initial state (default = NORMAL)</text>
  <rect x="500" y="776" width="12" height="8" rx="2" fill="#E53935"/>
  <text x="516" y="783" font-size="8" fill="#555">FAULT is latching</text>
  <rect x="610" y="776" width="12" height="8" rx="2" fill="#fff" stroke="#4A90E2" stroke-width="1"/>
  <text x="626" y="783" font-size="8" fill="#555">Sensor inventory</text>
  <rect x="720" y="776" width="12" height="8" rx="2" fill="#fff" stroke="#43A047" stroke-width="1"/>
  <text x="736" y="783" font-size="8" fill="#555">Actuator inventory</text>
  <text x="840" y="783" font-size="8" fill="#CCC">|</text>
  <text x="850" y="783" font-size="8" fill="#888">Priority: FROST > FAULT > BOOST > BYPASS > NORMAL</text>
</svg>