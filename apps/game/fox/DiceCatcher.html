<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>
    <title>Dice Catcher</title>
    <style>
      html, body {
        padding: 0;
        margin: 0;
        overflow: hidden;
        height: 100%;
        background: #0d0d1a;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Let #screen shrink-wrap the canvas so flexbox can centre it */
      #screen {
        display: inline-block;
      }
      #qtspinner {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #ffffff;
        font-family: sans-serif;
        line-height: 150%;
        margin-top: 1.5em;
      }
    </style>
  </head>
  <body onload="init()">
    <figure id="qtspinner">
      <img src="qtlogo.svg" width="320" height="200" style="display:block">
      <strong>Dice Catcher</strong>
      <div id="qtstatus">Loading...</div>
      <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
    </figure>
    <div id="screen"></div>

    <script type="text/javascript">
      async function init() {
        const spinner = document.querySelector('#qtspinner');
        const screen  = document.querySelector('#screen');
        const status  = document.querySelector('#qtstatus');

        const showUi = (ui) => {
          [spinner, screen].forEach(el => el.style.display = 'none');
          if (screen === ui) screen.style.display = 'inline-block';
          else               ui.style.display = 'flex';
        };

        try {
          showUi(spinner);
          status.innerHTML = 'Loading...';

          const instance = await qtLoad({
            qt: {
              onLoaded: () => showUi(screen),
              onExit: exitData => {
                status.innerHTML  = 'Application exit';
                status.innerHTML += exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                status.innerHTML += exitData.text !== undefined ? ` (${exitData.text})` : '';
                showUi(spinner);
              },
              entryFunction:     window.DiceCatcher_entry,
              containerElements: [screen],
            }
          });
        } catch (e) {
          console.error(e);
          console.error(e.stack);
        }
      }
    </script>
    <script src="DiceCatcher.js"></script>
    <script src="qtloader.js"></script>
  </body>
</html>
